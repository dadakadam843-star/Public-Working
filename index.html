<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>सेवक संघटना</title>

<style>
body {font-family: Arial; margin:0;}

/* Header */
.header {background:#004d40;color:white;padding:10px;text-align:center}

/* Sections */
section {padding:20px}
h2 {color:#004d40}

/* Form */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* Button */
button {
  background:#004d40;
  color:white;
  padding:10px;
  border:none;
}

/* Gallery */
.gallery img {
  width:30%;
  margin:5px;
}

/* Notice */
.notice {
  background:#fff3cd;
  padding:10px;
  border-left:5px solid orange;
}

/* WhatsApp */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}

/* Popup */
.popup {
 display:none;
 position:fixed;
 top:20%;
 left:10%;
 right:10%;
 background:white;
 padding:20px;
 border:2px solid black;
}
</style>

<script>
function sendWhatsApp() {
  var name = document.getElementById("name").value;
  var mobile = document.getElementById("mobile").value;

  var msg = "नवीन नोंदणी:%0Aनाव: " + name + "%0Aमोबाईल: " + mobile;

  window.open("https://wa.me/919975027750?text=" + msg);
}

/* Notice Add */
function addNotice() {
  var text = document.getElementById("noticeText").value;
  document.getElementById("noticeList").innerHTML += "<p class='notice'>" + text + "</p>";
}
</script>

</head>

<body>

<div class="header">
<h1>सेवक संघटित व असंघटित आरोग्य कामगार संघटना</h1>
<p>महाराष्ट्र राज्य</p>
</div>

<!-- Form -->
<section>
<h2>ऑनलाइन नोंदणी</h2>

<input type="text" id="name" placeholder="नाव">
<input type="number" id="mobile" placeholder="मोबाईल">

<button onclick="sendWhatsApp()">नोंदणी करा (WhatsApp)</button>
</section>

<!-- Gallery -->
<section>
<h2>फोटो गॅलरी</h2>
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>
</section>

<!-- Notice -->
<section>
<h2>नवीन अपडेट</h2>

<div id="noticeList">
<p class="notice">नवीन योजना सुरु</p>
</div>

<h3>Admin Notice Add</h3>
<input type="text" id="noticeText" placeholder="नवीन नोटीस">
<button onclick="addNotice()">Add Notice</button>

</section>

<!-- WhatsApp -->
<a class="whatsapp" href="https://wa.me/919975027750">💬</a>

</body>
</html>
